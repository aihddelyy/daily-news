name: Daily News Auto-Update

on:
  schedule:
    # 每天北京时间早上 8:00 (UTC 0:00)
    - cron: '0 0 * * *'
  workflow_dispatch:
  # push:
  #   branches:
  #     - master
  #   paths-ignore:
  #     - 'docs/**'
  #     - 'data/**'

env:
  TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
  MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
  MINIMAX_GROUP_ID: ${{ secrets.MINIMAX_GROUP_ID }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Generate News Content
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Generate daily news
        run: node backend/scraper/generate.js --real --archive
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: news-content
          path: |
            docs/
            data/
          retention-days: 1

  deploy:
    name: Sync and Push
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: news-content

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/ data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update daily news [skip ci]" && git push)

name: Daily News Auto-Update

on:
  schedule:
    # 每天北京时间早上 8:00 (UTC 0:00)
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
      - 'data/**'

jobs:
  generate-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Generate daily news (with real data and archive)
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
        run: node backend/scraper/generate.js --real --archive
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/ data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update daily news [skip ci]" && git push)

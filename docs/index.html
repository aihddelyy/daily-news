<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>重定向中...</title>
  <script>
    // 自动跳转到最新日报
    const files = [
      'daily_news_2026-03-14.html',
      'daily_news_2026-03-13.html', 
      'index.html'
    ];
    
    // 尝试加载最新日报
    async function redirect() {
      for (const file of files) {
        try {
          const response = await fetch(file, { method: 'HEAD' });
          if (response.ok) {
            window.location.href = file;
            return;
          }
        } catch (e) {
          continue;
        }
      }
      // 如果都没有，显示提示
      document.getElementById('content').innerHTML = '<p>正在生成日报，请稍后刷新页面...</p>';
    }
    
    redirect();
  </script>
</head>
<body>
  <div id="content" style="font-family: system-ui; padding: 50px; text-align: center;">
    <p>正在加载每日资讯...</p>
  </div>
</body>
</html>

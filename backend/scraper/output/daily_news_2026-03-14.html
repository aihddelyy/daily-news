<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日资讯简报 2026年3月14日</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 900px; margin: 0 auto; }
    .header {
      text-align: center;
      padding: 40px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 20px;
      margin-bottom: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .header h1 {
      color: white;
      font-size: 2.5em;
      margin-bottom: 10px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }
    .header .date { color: rgba(255,255,255,0.9); font-size: 1.2em; }
    .header .stats { 
      margin-top: 15px; 
      color: rgba(255,255,255,0.8);
      font-size: 0.95em;
    }
    .topic-card {
      background: white;
      border-radius: 16px;
      margin-bottom: 20px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }
    .topic-card:hover { transform: translateY(-5px); }
    .topic-header {
      padding: 20px 25px;
      display: flex;
      align-items: center;
      gap: 15px;
      border-bottom: 1px solid #f0f0f0;
    }
    .topic-icon { font-size: 2em; }
    .topic-name { 
      font-size: 1.4em; 
      font-weight: 700;
      color: #1a1a2e;
    }
    .topic-count {
      margin-left: auto;
      background: #f5f5f5;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 0.85em;
      color: #666;
    }
    .news-list { padding: 15px 25px; }
    .news-item {
      padding: 15px 0;
      border-bottom: 1px solid #f5f5f5;
    }
    .news-item:last-child { border-bottom: none; }
    .news-item a {
      color: #333;
      text-decoration: none;
      font-size: 1.05em;
      line-height: 1.5;
      display: block;
      transition: color 0.2s;
    }
    .news-item a:hover { color: #667eea; }
    .news-meta {
      margin-top: 8px;
      font-size: 0.85em;
      color: #999;
      display: flex;
      gap: 15px;
    }
    .news-source { 
      background: #f0f0f0;
      padding: 2px 10px;
      border-radius: 10px;
    }
    .footer {
      text-align: center;
      padding: 30px;
      color: rgba(255,255,255,0.6);
      font-size: 0.9em;
    }
    @media (max-width: 600px) {
      .header h1 { font-size: 1.8em; }
      .topic-header { padding: 15px 20px; }
      .news-list { padding: 10px 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📰 每日资讯简报</h1>
      <div class="date">2026年3月14日 • 星期六</div>
      <div class="stats">共 0 条资讯 • 0 个主题</div>
    </div>

    <div class="footer">
      <p>由 AI 日报系统自动生成 • 2026年3月14日</p>
    </div>
  </div>
</body>
</html>
